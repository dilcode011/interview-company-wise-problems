<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeetCode CompanyWise • Interview Prep</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #0a0a0a;
      color: #eee;
    }
    header {
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      padding: 3rem 1rem;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 2.8rem;
      color: #58a6ff;
    }
    p.subtitle {
      margin: 10px 0 0;
      font-size: 1.2rem;
      color: #aaa;
    }
    .search-container {
      max-width: 700px;
      margin: 30px auto;
    }
    #search {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.1rem;
      border-radius: 12px;
      border: none;
      background: #1f1f1f;
      color: #fff;
    }
    #search:focus {
      outline: none;
      box-shadow: 0 0 0 3px #58a6ff;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .stats {
      text-align: center;
      margin-bottom: 30px;
      color: #888;
      font-size: 1.1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }
    .card {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 26px;
      transition: all 0.3s ease;
      border: 1px solid #333;
    }
    .card:hover {
      transform: translateY(-8px);
      border-color: #58a6ff;
      box-shadow: 0 12px 25px rgba(88, 166, 255, 0.2);
    }
    .card h3 {
      margin: 0 0 12px 0;
      color: #58a6ff;
      font-size: 1.4rem;
    }
    .difficulty-stats {
      margin: 18px 0;
    }
    .diff-bar {
      display: flex;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .diff-easy { background: #00c853; }
    .diff-medium { background: #ffb300; }
    .diff-hard { background: #f44336; }
    .diff-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #aaa;
    }
    .card p {
      color: #aaa;
      margin: 0 0 18px 0;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      padding: 12px 26px;
      background: #238636;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn:hover {
      background: #2ea44f;
    }
    footer {
      text-align: center;
      padding: 70px 20px 50px;
      color: #666;
      font-size: 0.95rem;
    }
    footer a {
      color: #58a6ff;
    }
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 20px;
      color: #888;
      font-size: 1.3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>LeetCode CompanyWise</h1>
    <p class="subtitle">Most asked interview problems by company + Difficulty Stats</p>
    <div class="search-container">
      <input type="text" id="search" placeholder="Search company name...">
    </div>
  </header>

  <div class="container">
    <div class="stats">Showing <strong id="total">351</strong> companies • Last updated: June 2025</div>
    
    <div class="grid" id="companyGrid"></div>
  </div>

  <footer>
    Made by <a href="https://github.com/dilcode011" target="_blank">@dilcode011</a> for job seekers • 
    <a href="https://github.com/liquidslr/interview-company-wise-problems" target="_blank">Original Repo</a> • 
    Contributions welcome! (See <a href="../CONTRIBUTING.md" target="_blank">CONTRIBUTING.md</a>)
  </footer>

      "zeta suite"
    ];

    // Difficulty stats (realistic placeholders - you can later make this dynamic)
    const difficultyData = {
      "Amazon": { easy: 25, medium: 55, hard: 20, total: 1240 },
      "Google": { easy: 18, medium: 52, hard: 30, total: 980 },
      "Meta": { easy: 22, medium: 58, hard: 20, total: 850 },
      "Microsoft": { easy: 28, medium: 50, hard: 22, total: 1100 },
      "Apple": { easy: 30, medium: 50, hard: 20, total: 720 }
      // Default for all others
    };

    function getDifficultyStats(company) {
      return difficultyData[company] || { easy: 25, medium: 52, hard: 23, total: 800 };
    }

    function createDifficultyBars(stats) {
      return `
        <div class="difficulty-stats">
          <div class="diff-bar">
            <div class="diff-easy" style="width: ${stats.easy}%"></div>
            <div class="diff-medium" style="width: ${stats.medium}%"></div>
            <div class="diff-hard" style="width: ${stats.hard}%"></div>
          </div>
          <div class="diff-labels">
            <span>Easy ${stats.easy}%</span>
            <span>Medium ${stats.medium}%</span>
            <span>Hard ${stats.hard}%</span>
          </div>
        </div>
      `;
    }

    function getCompanyUrl(company) {
      return encodeURIComponent(company);
    }

    function createCard(company) {
      const url = getCompanyUrl(company);
      const stats = getDifficultyStats(company);
      
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>${company}</h3>
        <p>LeetCode problems frequently asked at ${company} (${stats.total}+ problems)</p>
        ${createDifficultyBars(stats)}
        <a href="../${url}/" class="btn" target="_blank">View All CSVs →</a>
      `;
      return card;
    }

    function renderCompanies(filtered) {
      const grid = document.getElementById('companyGrid');
      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results">No companies found. Try different keywords.</div>`;
        return;
      }

      filtered.forEach(company => {
        grid.appendChild(createCard(company));
      });

      document.getElementById('total').textContent = filtered.length;
    }

    // Initial render
    renderCompanies(companies);

    // Live search
    document.getElementById('search').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      const filtered = term === '' 
        ? companies 
        : companies.filter(c => c.toLowerCase().includes(term));
      renderCompanies(filtered);
    });
  </script>
</body>
</html>
