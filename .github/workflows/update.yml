name: Update LeetCode Company Data

on:
  schedule:
    - cron: '0 0 1 * *'        
  workflow_dispatch:           

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update Popular Companies (Example: Amazon, Google, Meta)
        run: |
          python scripts/update_company.py "Amazon"
          python scripts/update_company.py "Google"
          python scripts/update_company.py "Meta"
          python scripts/update_company.py "Microsoft"
          python scripts/update_company.py "Apple"

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update LeetCode company data"
          file_pattern: "*.csv"
